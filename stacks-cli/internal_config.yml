# stacks-cli internal configuration override for Azure Platform Landing Zone modules.
#
# Usage:
#   stacks-cli scaffold -c stacks.yml --internalconfig internal_config.yml
#
# All components clone the same monorepo. The stackscli.yml at the repo root
# uses tags to select which src/{module}/ gets copied based on framework.option.
#
# The __VERSION__ placeholder is replaced automatically by the build pipeline
# with the release tag (e.g. v0.0.79) — no manual updates needed.

frameworks:
  - name: infra
    commands:
      - name: git
      - name: terraform
      - name: pwsh
      - name: eirctl

stacks:
  components:
    infra_alz_management:
      group: infra
      name: alz_management
      package: &package
        url: https://github.com/thepaulmacca-ensono/eirctl-testing
        type: git
        version: __VERSION__

    infra_alz_connectivity_hub_spoke:
      group: infra
      name: alz_connectivity_hub_spoke
      package: *package

    infra_alz_connectivity_virtual_wan:
      group: infra
      name: alz_connectivity_virtual_wan
      package: *package
