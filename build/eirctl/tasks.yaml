tasks:
  # ADO
  ado:build:number:
    context: powershell
    description: Update the Build Number in Azure DevOps
    command:
      - Update-BuildNumber -BuildNumber $env:BUILD_BUILDNUMBER

  ado:pipeline:retain:
    context: powershell
    description: |
      Retain an Azure DevOps pipeline run for a configurable number of years

      Set to 365 days (1 year) by default.
      Skips gracefully when not running in Azure DevOps.
    command: |
      if (-not $env:ADO_ACCESS_TOKEN) {
        Write-Host "ADO_ACCESS_TOKEN not set — skipping pipeline retention (not running in Azure DevOps)"
        return
      }
      $retentionYears = if ($env:RETENTION_YEARS) { [int]$env:RETENTION_YEARS } else { 1 }
      $daysValid = 365 * $retentionYears
      $contentType = "application/json"
      $headers = @{ Authorization = "Bearer $env:ADO_ACCESS_TOKEN" }
      $rawRequest = @{
          daysValid       = $daysValid
          definitionId    = $env:SYSTEM_DEFINITIONID
          ownerId         = "User:$env:BUILD_REQUESTEDFORID"
          protectPipeline = $false
          runId           = $env:BUILD_BUILDID
      }
      $request = ConvertTo-Json @($rawRequest)
      $uri = "$env:SYSTEM_COLLECTIONURI$env:SYSTEM_TEAMPROJECT/_apis/build/retention/leases?api-version=6.0-preview.1"
      $response = Invoke-RestMethod -uri $uri -method POST -Headers $headers -ContentType $contentType -Body $request
      Write-Host "Pipeline run successfully retained for $retentionYears year(s)."

  # Linting
  lint:yaml:
    context: infra
    description: |
      Perform YAML Linting using Yamllint

      By default the utility uses `yamllint.conf` in the current directory
    command:
      - Invoke-YamlLint -FailOnWarnings $False

  # Terraform
  lint:terraform:format:
    context: infra
    description: Perform Terraform Format Check
    command:
      - Invoke-Terraform -Format -Path $env:TF_FILE_LOCATION -Debug
    required:
      env:
        - TF_FILE_LOCATION

  lint:terraform:validate:
    context: infra
    description: Perform Terraform Validation
    command:
      - Invoke-Terraform -Validate -Path $env:TF_FILE_LOCATION -Debug
    required:
      env:
        - TF_FILE_LOCATION

  lint:terraform:tflint:
    context: infra
    description: Perform Terraform Linting using TFLint
    command: |
      tflint --init --chdir=$env:TF_FILE_LOCATION
      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      tflint --chdir=$env:TF_FILE_LOCATION --format=junit | Out-File test-results/tflint-results.xml -Encoding UTF8
      tflint --chdir=$env:TF_FILE_LOCATION
    required:
      env:
        - TF_FILE_LOCATION

  terraform:docs:
    context: infra
    description: Generate Terraform Module Documentation
    command: |
      terraform-docs $env:TF_FILE_LOCATION

      git config --global --add safe.directory /eirctl
      git diff --exit-code . ":(exclude)$env:TF_FILE_LOCATION/.terraform.lock.hcl"
    required:
      env:
        - TF_FILE_LOCATION

  terraform:init:
    context: infra
    description: |
      Initialise Terraform

      Optionally pass backend arguments via TF_BACKEND_INIT.
      Optionally set a workspace via ENVIRONMENT_NAME.
    command: |
      $arguments = @()
      if ($env:TF_BACKEND_INIT) {
        $arguments += $env:TF_BACKEND_INIT
      }

      Invoke-Terraform -Init -Path $env:TF_FILE_LOCATION -Arguments $arguments -Debug

      if ($env:ENVIRONMENT_NAME) {
        Invoke-Terraform -Workspace -Path $env:TF_FILE_LOCATION -Arguments $env:ENVIRONMENT_NAME -Debug
      }
    required:
      env:
        - TF_FILE_LOCATION

  terraform:init:false:
    context: infra
    description: Initialise Terraform with False Backend (for CI validation)
    command: |
      cd $env:TF_FILE_LOCATION
      terraform init -backend=false
    required:
      env:
        - TF_FILE_LOCATION

  terraform:tests:
    context: infra
    description: |
      Run Terraform Tests and produce JUnit XML at terraform-test-results.xml
      Set TF_TEST_FILTER to run a specific test file (e.g., TF_TEST_FILTER=tests/main.tftest.hcl)
    command: |
      $root = $PWD.Path
      cd $env:TF_FILE_LOCATION
      $filter = if ($env:TF_TEST_FILTER) { "-filter=$($env:TF_TEST_FILTER)" }
      $allLines = @(& terraform test -json $filter 2>&1)
      $allLines | ForEach-Object {
        try { $_.ToString() | ConvertFrom-Json -EA Stop } catch {}
      } | Where-Object { $_.type -eq 'test_summary' -or $_.type -eq 'test_file' -or $_.type -eq 'test_run' } | ForEach-Object {
        Write-Host $_.'@message'
      }
      $tests = @($allLines | ForEach-Object {
        try { $_.ToString() | ConvertFrom-Json -EA Stop } catch {}
      } | Where-Object { $_.type -eq 'test_run' -and $_.test_run.progress -eq 'complete' })
      $fail = @($tests | Where-Object { $_.test_run.status -ne 'pass' }).Count
      $e = [System.Security.SecurityElement]
      $x = '<?xml version="1.0" encoding="UTF-8"?>' +
        "<testsuites tests=`"$($tests.Count)`" failures=`"$fail`"><testsuite name=`"terraform`" tests=`"$($tests.Count)`" failures=`"$fail`">"
      $tests | ForEach-Object {
        $x += "<testcase name=`"$($e::Escape($_.test_run.run))`" classname=`"$($e::Escape($_.test_run.path))`">"
        if ($_.test_run.status -ne 'pass') { $m = $e::Escape($_.'@message'); $x += "<failure message=`"$m`">$m</failure>" }
        $x += "</testcase>"
      }
      $x += "</testsuite></testsuites>"
      New-Item -ItemType Directory -Path "$root/test-results" -Force | Out-Null
      $x | Out-File "$root/test-results/terraform-test-results.xml" -Encoding UTF8
      if ($fail) { exit 1 }
    required:
      env:
        - TF_FILE_LOCATION

  # Scanning
  scan:terraform:checkov:
    context: infra
    description: Perform Terraform Static Code Analysis using Checkov
    command: |
      $pkg = if ($env:CHECKOV_VERSION) { "checkov==$env:CHECKOV_VERSION" } else { "checkov" }
      pip3 -q install -U $pkg

      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      checkov -d $env:TF_FILE_LOCATION -o cli -o junitxml --output-file-path console,test-results/checkov-results.xml
    required:
      env:
        - TF_FILE_LOCATION

  # Documentation
  docs:docbook:
    context: asciidoc
    description: Convert Documentation to Docbook for conversion to Markdown
    command:
      - asciidoctor -b docbook -o outputs/tmp/README.xml docs/readme/index.adoc

  docs:markdown:
    context: asciidoc
    description: Convert the Docbook README to Markdown
    command:
      - pandoc -f docbook -t gfm -o outputs/module/README.md outputs/tmp/README.xml

  docs:generate:
    context: asciidoc
    description: Build Docs for the Module
    command: |
      Build-Documentation -Config /eirctl/docs/repository/conf/docs.json

  # Build
  build:clean:
    context: powershell
    description: Clean the outputs folder
    command: |
      Remove-Item -Path outputs -Recurse -Force -ErrorAction SilentlyContinue
      New-Item -ItemType Directory -Path outputs/module -Force | Out-Null

  build:copy:
    context: powershell
    description: Copy the Terraform Module into the outputs/module folder
    command: |
      Copy-Item -Path ${env:TF_FILE_LOCATION}/* -Destination outputs/module/ -Recurse -Force -Exclude tests,.terraform,.terraform.lock.hcl
    required:
      env:
        - TF_FILE_LOCATION

  build:package:
    context: powershell
    description: |
      Create Zip Package for the Terraform Module

      Resolves repository name from GITHUB_REPOSITORY or BUILD_REPOSITORY_NAME.
      Resolves build number from BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER.
    command: |
      $repoFullName = if ($env:GITHUB_REPOSITORY) { $env:GITHUB_REPOSITORY } else { $env:BUILD_REPOSITORY_NAME }
      if (-not $repoFullName) {
        Write-Error "GITHUB_REPOSITORY or BUILD_REPOSITORY_NAME environment variable is required"
        exit 1
      }
      $repoName = ($repoFullName -split '/')[-1]

      $buildNumber = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $buildNumber) {
        Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER environment variable is required"
        exit 1
      }

      $zipPath = ("outputs/{0}-{1}.zip" -f $repoName, $buildNumber)
      Write-Host ("Creating package: {0}" -f $zipPath)
      Compress-Archive -Path outputs/module/* -DestinationPath $zipPath -Force

  # Git
  git:tag:
    context: powershell
    description: |
      Tag a commit and push to origin.

      Resolves version from BUILD_BUILDNUMBER (ADO) or GITHUB_RUN_NUMBER (GHA).
      Resolves commit SHA from BUILD_SOURCEVERSION (ADO) or GITHUB_SHA (GHA).
      Authenticates using ADO_ACCESS_TOKEN/SYSTEM_ACCESSTOKEN for Azure Repos
      or GITHUB_TOKEN for GitHub.
    command: |
      git config --global --add safe.directory /eirctl

      $version = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $version) {
        Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER environment variable is required"
        exit 1
      }

      $commitId = if ($env:BUILD_SOURCEVERSION) { $env:BUILD_SOURCEVERSION } else { $env:GITHUB_SHA }
      if (-not $commitId) {
        Write-Error "BUILD_SOURCEVERSION or GITHUB_SHA environment variable is required"
        exit 1
      }

      $repoUri = if ($env:BUILD_REPOSITORY_URI) {
        $env:BUILD_REPOSITORY_URI
      } elseif ($env:GITHUB_REPOSITORY) {
        "https://github.com/$($env:GITHUB_REPOSITORY)"
      } else {
        Write-Error "BUILD_REPOSITORY_URI or GITHUB_REPOSITORY environment variable is required"
        exit 1
      }

      if ($repoUri -match 'dev\.azure\.com|visualstudio\.com') {
        $token = if ($env:ADO_ACCESS_TOKEN) { $env:ADO_ACCESS_TOKEN } else { $env:SYSTEM_ACCESSTOKEN }
        if (-not $token) {
          Write-Error "ADO_ACCESS_TOKEN or SYSTEM_ACCESSTOKEN environment variable is required for Azure Repos"
          exit 1
        }
        $authenticatedUri = $repoUri -replace 'https://', "https://token:$($token)@"
      } else {
        if (-not $env:GITHUB_TOKEN) {
          Write-Error "GITHUB_TOKEN environment variable is required for GitHub"
          exit 1
        }
        $authenticatedUri = $repoUri -replace 'https://', "https://x-access-token:$($env:GITHUB_TOKEN)@"
      }
      git remote set-url origin $authenticatedUri

      $tagName = "v$version"
      Write-Host "Tagging commit $commitId as $tagName"
      git tag $tagName $commitId
      git push origin $tagName

  ## Release
  github:release:
    context: powershell
    description: |
      Publish a Release to GitHub

      Resolves version from BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER.
      Resolves commit ID from BUILD_SOURCEVERSION (ADO) or GITHUB_SHA (GHA).
      ARTIFACTS_DIR defaults to outputs/assets if not set.
    command: |
      $repoFullName = if ($env:GITHUB_REPOSITORY) { $env:GITHUB_REPOSITORY } else { $env:BUILD_REPOSITORY_NAME }
      if (-not $repoFullName) {
        Write-Error "GITHUB_REPOSITORY or BUILD_REPOSITORY_NAME environment variable is required"
        exit 1
      }
      $owner = ($repoFullName -split '/')[0]
      $repo = ($repoFullName -split '/')[-1]

      $version = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $version) {
        Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER environment variable is required"
        exit 1
      }

      $commitId = if ($env:BUILD_SOURCEVERSION) { $env:BUILD_SOURCEVERSION } else { $env:GITHUB_SHA }

      $artifactsDir = if ($env:ARTIFACTS_DIR) { $env:ARTIFACTS_DIR } else { "outputs/assets" }

      Publish-GitHubRelease -version $version -commitId $commitId -apikey $env:GITHUB_TOKEN -artifactsDir $artifactsDir -Owner $owner -repository $repo -generateReleaseNotes $true
    required:
      env:
        - GITHUB_TOKEN
        - PUBLISH_RELEASE
