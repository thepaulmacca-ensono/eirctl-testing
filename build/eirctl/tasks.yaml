tasks:
  # ADO
  ado:build:number:
    context: powershell
    description: Update the build number in Azure DevOps
    command:
      - Update-BuildNumber -BuildNumber $env:BUILD_BUILDNUMBER

  ado:pipeline:retain:
    context: powershell
    description: |
      Retain an Azure DevOps pipeline run for a configurable number of years

      Set to 365 days (1 year) by default
    command: |
      $retentionYears = if ($env:RETENTION_YEARS) { [int]$env:RETENTION_YEARS } else { 1 }
      $daysValid = 365 * $retentionYears
      $contentType = "application/json"
      $headers = @{ Authorization = "Bearer $env:ADO_ACCESS_TOKEN" }
      $rawRequest = @{
        daysValid       = $daysValid
        definitionId    = $env:SYSTEM_DEFINITIONID
        ownerId         = "User:$env:BUILD_REQUESTEDFORID"
        protectPipeline = $false
        runId           = $env:BUILD_BUILDID
      }
      $request = ConvertTo-Json @($rawRequest)
      $uri = "$env:SYSTEM_COLLECTIONURI$env:SYSTEM_TEAMPROJECT/_apis/build/retention/leases?api-version=6.0-preview.1"
      Invoke-RestMethod -uri $uri -method POST -Headers $headers -ContentType $contentType -Body $request | Out-Null
      Write-Host "Pipeline run successfully retained for $retentionYears year(s)."
    required:
      env:
        - ADO_ACCESS_TOKEN

  # Security
  ## Linting
  lint:yaml:
    context: infra
    description: |
      Perform YAML linting using yamllint

      By default the utility uses `yamllint.conf` in the current directory
      Set YAMLLINT_FAIL_ON_WARNINGS=true to enable strict mode (default: false)
    command: |
      $failOnWarnings = if ($env:YAMLLINT_FAIL_ON_WARNINGS -eq 'true') { $true } else { $false }
      Invoke-YamlLint -FailOnWarnings $failOnWarnings

  lint:powershell:
    context: infra
    description: |
      Run PSScriptAnalyzer on PowerShell embedded in eirctl tasks

      Parses all YAML files under the working directory, extracts command blocks,
      and produces JUnit XML results at test-results/psscriptanalyzer-results.xml

      Set PSSCRIPTANALYZER_EXCLUDE_RULES to a comma-separated list of rule names
      to exclude (default: PSAvoidUsingWriteHost, PSUseBOMForUnicodeEncodedFile).
      Set PSSCRIPTANALYZER_PATH to override the search directory (default: current directory).
    command: |
      $searchPath = if ($env:PSSCRIPTANALYZER_PATH) { $env:PSSCRIPTANALYZER_PATH } else { "." }
      $excludeRules = if ($env:PSSCRIPTANALYZER_EXCLUDE_RULES) {
        $env:PSSCRIPTANALYZER_EXCLUDE_RULES -split ','
      } else {
        @("PSAvoidUsingWriteHost", "PSUseBOMForUnicodeEncodedFile")
      }

      $yamlFiles = Get-ChildItem -Path $searchPath -Recurse -Include *.yaml, *.yml |
        Where-Object { $_.FullName -notmatch '[\\/]\.github[\\/]' }

      $e = [System.Security.SecurityElement]
      $testcases = @()
      $allResults = @()
      $totalScripts = 0

      foreach ($file in $yamlFiles) {
        $parsed = ConvertFrom-Yaml (Get-Content -Raw $file.FullName)
        if (-not $parsed.tasks) { continue }

        foreach ($taskEntry in $parsed.tasks.GetEnumerator()) {
          if (-not $taskEntry.Value.command) { continue }

          $ps = if ($taskEntry.Value.command -is [System.Collections.IList]) {
            ($taskEntry.Value.command | ForEach-Object { $_.ToString() }) -join "`n"
          } else {
            $taskEntry.Value.command.ToString()
          }

          $tmpFile = [System.IO.Path]::GetTempFileName() -replace '\.tmp$', '.ps1'
          $ps | Set-Content -Path $tmpFile -Encoding UTF8
          $totalScripts++

          $results = @(Invoke-ScriptAnalyzer -Path $tmpFile -ExcludeRule $excludeRules)
          Remove-Item $tmpFile -Force

          $escapedName = $e::Escape($taskEntry.Key)
          $escapedClass = $e::Escape($file.FullName)

          if ($results) {
            foreach ($r in $results) {
              $allResults += [PSCustomObject]@{
                Task = $taskEntry.Key; Severity = $r.Severity; Rule = $r.RuleName; Message = $r.Message; Line = $r.Line
              }
              $msg = $e::Escape("[{0}] {1}: {2} (line {3})" -f $r.Severity, $r.RuleName, $r.Message, $r.Line)
              $testcases += "<testcase name=`"$escapedName`" classname=`"$escapedClass`"><failure message=`"$msg`">$msg</failure></testcase>"
            }
          } else {
            $testcases += "<testcase name=`"$escapedName`" classname=`"$escapedClass`" />"
          }
        }
      }

      $failCount = @($allResults | Where-Object { $_.Severity -eq 'Error' -or $_.Severity -eq 'Warning' }).Count
      $xml = '<?xml version="1.0" encoding="UTF-8"?>' +
        "<testsuites tests=`"$totalScripts`" failures=`"$failCount`">" +
        "<testsuite name=`"PSScriptAnalyzer`" tests=`"$totalScripts`" failures=`"$failCount`">" +
        ($testcases -join '') +
        "</testsuite></testsuites>"

      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      $xml | Out-File test-results/psscriptanalyzer-results.xml -Encoding UTF8

      Write-Host ("Analysed {0} scripts from {1} files — {2} issue(s) found" -f $totalScripts, $yamlFiles.Count, $allResults.Count)
      $allResults | ForEach-Object {
        Write-Host ("  [{0}] {1} :: {2}: {3} (line {4})" -f $_.Severity, $_.Task, $_.Rule, $_.Message, $_.Line)
      }
      if ($failCount -gt 0) { exit 1 }

  ## Scanning
  scan:terraform:checkov:
    context: infra
    description: Perform Terraform static code analysis using Checkov
    command: |
      $pkg = if ($env:CHECKOV_VERSION) { "checkov==$env:CHECKOV_VERSION" } else { "checkov" }
      pip3 -q install -U $pkg
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      checkov -d $env:TF_FILE_LOCATION -o cli -o junitxml --output-file-path console,test-results/checkov-results.xml
      exit $LASTEXITCODE
    required:
      env:
        - TF_FILE_LOCATION

  # Infra
  ## Terraform
  lint:terraform:format:
    context: infra
    description: |
      Perform Terraform format check

      Optionally set TF_FILE_LOCATION to scope the check to a specific directory.
      Without it, checks all .tf files recursively from the working directory.
      Set TF_DEBUG=true to enable debug output
    command: |
      $debugFlag = @{}; if ($env:TF_DEBUG -eq 'true') { $debugFlag = @{ Debug = $true } }
      $pathFlag = @{}; if ($env:TF_FILE_LOCATION) { $pathFlag = @{ Path = $env:TF_FILE_LOCATION } }
      Invoke-Terraform -Format @pathFlag @debugFlag

  lint:terraform:validate:
    context: infra
    description: |
      Perform Terraform validate

      Set TF_DEBUG=true to enable debug output
    command: |
      $debugFlag = @{}; if ($env:TF_DEBUG -eq 'true') { $debugFlag = @{ Debug = $true } }
      Invoke-Terraform -Validate -Path $env:TF_FILE_LOCATION @debugFlag
    required:
      env:
        - TF_FILE_LOCATION

  lint:terraform:tflint:
    context: infra
    description: |
      Perform Terraform linting using TFLint

      Set TFLINT_CONFIG to override the default TFLint configuration file (.tflint.hcl)
    command: |
      $configPath = if ($env:TFLINT_CONFIG) { $env:TFLINT_CONFIG } else { ".tflint.hcl" }
      $configArg = "--config=$PWD/$configPath"
      tflint --init --chdir=$env:TF_FILE_LOCATION $configArg
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      tflint --chdir=$env:TF_FILE_LOCATION $configArg --format=junit | Out-File test-results/tflint-results.xml -Encoding UTF8
      tflint --chdir=$env:TF_FILE_LOCATION $configArg
      exit $LASTEXITCODE
    required:
      env:
        - TF_FILE_LOCATION

  terraform:docs:asciidoc:
    context: infra
    description: |
      Generate Terraform module documentation into AsciiDoc format

      The .terraform-docs.yml configuration file needs to have the formatter set to "asciidoc"
    command: |
      if (-not (Test-Path "$PWD/docs/readme")) {
        Write-Error "docs/readme directory does not exist"
        exit 1
      }

      $moduleName = $env:TF_MODULE_NAME
      $outputFile = "$PWD/docs/readme/$moduleName/tfdocs.adoc"

      terraform-docs -c .terraform-docs.yml --output-file $outputFile $env:TF_FILE_LOCATION
      exit $LASTEXITCODE
    required:
      env:
        - TF_FILE_LOCATION
        - TF_MODULE_NAME

  terraform:docs:asciidoc:readme:
    context: powershell
    description: |
      Copy the AsciiDoc-generated README to the module source directory

      Runs after docs:markdown to update src/<module>/README.md with the full
      AsciiDoc-generated content including terraform-docs tables

      Supports two module layouts:
        - Nested: src/<module>/deploy/terraform/ (TF_FILE_LOCATION points to deploy/terraform)
        - Flat:   src/<module>/ (TF_FILE_LOCATION points to the module root with .tf files)
    command: |
      $source = "outputs/module/README.md"
      $tfPath = $env:TF_FILE_LOCATION.TrimEnd('/\')
      if ($tfPath -match '[/\\]deploy[/\\]terraform$') {
        $moduleRoot = Split-Path (Split-Path $tfPath -Parent) -Parent
      } else {
        $moduleRoot = $tfPath
      }
      $destination = Join-Path $moduleRoot "README.md"

      if (-not (Test-Path $source)) {
        Write-Error "Generated README not found at $source"
        exit 1
      }

      Copy-Item -Path $source -Destination $destination -Force
      Write-Host "Copied AsciiDoc-generated README to $destination"
    required:
      env:
        - TF_FILE_LOCATION

  terraform:init:
    context: infra
    description: |
      Initialise Terraform

      Optionally pass backend arguments via TF_BACKEND_INIT
      Optionally set a workspace via ENVIRONMENT_NAME
      Set TF_DEBUG=true to enable debug output
    command: |
      $arguments = @()
      if ($env:TF_BACKEND_INIT) {
        $arguments += $env:TF_BACKEND_INIT
      }

      $debugFlag = @{}; if ($env:TF_DEBUG -eq 'true') { $debugFlag = @{ Debug = $true } }

      Invoke-Terraform -Init -Path $env:TF_FILE_LOCATION -Arguments $arguments @debugFlag

      if ($env:ENVIRONMENT_NAME) {
        Invoke-Terraform -Workspace -Path $env:TF_FILE_LOCATION -Arguments $env:ENVIRONMENT_NAME @debugFlag
      }
    required:
      env:
        - TF_FILE_LOCATION

  terraform:init:false:
    context: infra
    description: |
      Initialise Terraform with false backend

      Set TF_DEBUG=true to enable debug output
    command: |
      Set-Location $env:TF_FILE_LOCATION
      terraform init -backend=false
      exit $LASTEXITCODE
    required:
      env:
        - TF_FILE_LOCATION

  terraform:tests:
    context: infra
    description: |
      Run Terraform tests

      Set TF_TEST_FILTER to run a specific test file (e.g., TF_TEST_FILTER=tests/main.tftest.hcl)
    command: |
      New-Item -ItemType Directory -Path test-results -Force | Out-Null
      $filter = if ($env:TF_TEST_FILTER) { "-filter=$($env:TF_TEST_FILTER)" }
      terraform "-chdir=$env:TF_FILE_LOCATION" test -junit-xml="$PWD/test-results/terraform-test-results.xml" $filter
      $tfExitCode = $LASTEXITCODE
      chmod 644 test-results/terraform-test-results.xml
      exit $tfExitCode
    required:
      env:
        - TF_FILE_LOCATION

  # Docs
  docs:docbook:
    context: asciidoc
    description: |
      Convert AsciiDoc documentation to Docbook for conversion to Markdown

      Set ADOC_INDEX_FILE to the path of the AsciiDoc index file
      (e.g., docs/readme/index.adoc or docs/readme/<module>/index.adoc)
    command: |
      if (-not (Test-Path "docs/readme")) {
        Write-Error "docs/readme directory not found"
        exit 1
      }
      New-Item -ItemType Directory -Path outputs/tmp -Force | Out-Null
      asciidoctor -b docbook -o outputs/tmp/README.xml $env:ADOC_INDEX_FILE
      exit $LASTEXITCODE
    required:
      env:
        - ADOC_INDEX_FILE

  docs:markdown:
    context: asciidoc
    description: Convert the Docbook README to Markdown
    command: |
      New-Item -ItemType Directory -Path outputs/module -Force | Out-Null
      $xmlContent = Get-Content outputs/tmp/README.xml -Raw
      $title = $null
      if ($xmlContent -match '<info>\s*<title>([^<]+)</title>') {
        $title = $Matches[1]
      }
      pandoc -f docbook -t gfm --shift-heading-level-by=1 -o outputs/module/README.md outputs/tmp/README.xml
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      if ($title) {
        $content = Get-Content outputs/module/README.md -Raw
        Set-Content outputs/module/README.md -Value "# $title`n`n$content" -NoNewline
      }
      $readme = Get-Content outputs/module/README.md -Raw
      $readme = $readme -replace '\\<!-- BEGIN_TF_DOCS [^\n]*={1,}\s*(\w[^\n]*)', "<!-- BEGIN_TF_DOCS -->`n## `$1"
      $readme = $readme -replace '\\<!-- BEGIN_TF_DOCS [^\n]*', '<!-- BEGIN_TF_DOCS -->'
      $readme = $readme -replace '[^\n]*\\<!-- END_TF_DOCS [^\n]*', '<!-- END_TF_DOCS -->'
      $readme = $readme -replace '~\\>', '~>'
      Set-Content outputs/module/README.md -Value $readme -NoNewline
      Remove-Item -Path outputs/tmp -Recurse -Force

  docs:generate:
    context: asciidoc
    description: Build AsciiDoc documentation
    command: |
      $configPath = "/eirctl/docs/repository/conf/docs.json"
      if (-not (Test-Path $configPath)) {
        Write-Error "Configuration file not found: $configPath"
        exit 1
      }
      Build-Documentation -Config $configPath
      if (-not $?) { exit 1 }

  # Module Zip File Build/Package
  terraform:build:clean:
    context: powershell
    description: Clean outputs folder
    command: |
      Remove-Item -Path outputs -Recurse -Force -ErrorAction SilentlyContinue
      New-Item -ItemType Directory -Path outputs/module -Force | Out-Null

  terraform:build:copy:
    context: powershell
    description: |
      Copy module files into outputs/module folder

      Supports two module layouts:
        - Nested: src/<module>/deploy/terraform/ (TF_FILE_LOCATION points to deploy/terraform)
        - Flat:   src/<module>/ (TF_FILE_LOCATION points to the module root with .tf files)
    command: |
      $tfPath = $env:TF_FILE_LOCATION.TrimEnd('/\')
      if ($tfPath -match '[/\\]deploy[/\\]terraform$') {
        $moduleRoot = Split-Path (Split-Path $tfPath -Parent) -Parent
      } else {
        $moduleRoot = $tfPath
      }
      Copy-Item -Path "$moduleRoot/*" -Destination "outputs/module/" -Recurse -Force -ErrorAction Stop
      @(
        "outputs/module/deploy/terraform/tests",
        "outputs/module/deploy/terraform/.terraform",
        "outputs/module/deploy/terraform/.terraform.lock.hcl",
        "outputs/module/tests",
        "outputs/module/.terraform",
        "outputs/module/.terraform.lock.hcl"
      ) | Where-Object { Test-Path $_ } | ForEach-Object {
        Remove-Item -Path $_ -Recurse -Force
      }
    required:
      env:
        - TF_FILE_LOCATION

  terraform:build:package:
    context: powershell
    description: |
      Create zip package for Terraform module

      Requires TF_MODULE_NAME to identify the module.
      Resolves build number from BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER.
    command: |
      if (-not $env:TF_MODULE_NAME) {
        Write-Error "TF_MODULE_NAME environment variable is required"
        exit 1
      }

      $buildNumber = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $buildNumber) {
        Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER environment variable is required"
        exit 1
      }

      $zipPath = ("outputs/{0}-{1}.zip" -f $env:TF_MODULE_NAME, $buildNumber)
      Write-Host ("Creating package: {0}" -f $zipPath)
      $sourceDir = (Resolve-Path "outputs/module").Path
      $destPath = (Join-Path (Resolve-Path "outputs").Path ("{0}-{1}.zip" -f $env:TF_MODULE_NAME, $buildNumber))
      Add-Type -AssemblyName System.IO.Compression.FileSystem
      if (Test-Path $destPath) { Remove-Item $destPath -Force }
      [System.IO.Compression.ZipFile]::CreateFromDirectory($sourceDir, $destPath)
      Remove-Item -Path outputs/module -Recurse -Force
    required:
      env:
        - TF_MODULE_NAME

  # Git
  git:tag:
    context: powershell
    description: |
      Tag a commit and push to origin

      Resolves version from BUILD_BUILDNUMBER (ADO) or GITHUB_RUN_NUMBER (GHA)
      Resolves commit SHA from BUILD_SOURCEVERSION (ADO) or GITHUB_SHA (GHA)
      Authenticates using ADO_ACCESS_TOKEN/SYSTEM_ACCESSTOKEN for Azure DevOps
      or GITHUB_TOKEN for GitHub
    command: |
      git config --global --add safe.directory /eirctl

      $version = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $version) {
        Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER environment variable is required"
        exit 1
      }

      $commitId = if ($env:BUILD_SOURCEVERSION) { $env:BUILD_SOURCEVERSION } else { $env:GITHUB_SHA }
      if (-not $commitId) {
        Write-Error "BUILD_SOURCEVERSION or GITHUB_SHA environment variable is required"
        exit 1
      }

      $repoUri = if ($env:BUILD_REPOSITORY_URI) {
        $env:BUILD_REPOSITORY_URI
      } elseif ($env:GITHUB_REPOSITORY) {
        "https://github.com/$($env:GITHUB_REPOSITORY)"
      } else {
        Write-Error "BUILD_REPOSITORY_URI or GITHUB_REPOSITORY environment variable is required"
        exit 1
      }

      if ($repoUri -match 'dev\.azure\.com|visualstudio\.com') {
        $token = if ($env:ADO_ACCESS_TOKEN) { $env:ADO_ACCESS_TOKEN } else { $env:SYSTEM_ACCESSTOKEN }
        if (-not $token) {
          Write-Error "ADO_ACCESS_TOKEN or SYSTEM_ACCESSTOKEN environment variable is required for Azure Repos"
          exit 1
        }
        $authenticatedUri = $repoUri -replace 'https://', "https://token:$($token)@"
      } else {
        if (-not $env:GITHUB_TOKEN) {
          Write-Error "GITHUB_TOKEN environment variable is required for GitHub"
          exit 1
        }
        $authenticatedUri = $repoUri -replace 'https://', "https://x-access-token:$($env:GITHUB_TOKEN)@"
      }
      git remote set-url origin $authenticatedUri

      $tagName = "v$version"
      Write-Host "Tagging commit $commitId as $tagName"
      git tag $tagName $commitId
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      git push origin $tagName
      exit $LASTEXITCODE

  ## Release
  github:release:
    context: powershell
    description: |
      Publish a GitHub Release

      Optional env vars: ARTIFACTS_DIR (default: outputs/assets), UPLOAD_ARTIFACTS (default: true),
      PUBLISH_RELEASE (default: true)
    command: |
      $repoFullName = if ($env:GITHUB_REPOSITORY) { $env:GITHUB_REPOSITORY }
        elseif ($env:BUILD_REPOSITORY_URI -match 'github\.com[/:]([^/]+)/([^/.]+)') { "$($Matches[1])/$($Matches[2])" }
        else { $null }
      if (-not $repoFullName) { Write-Error "Cannot resolve GitHub owner/repo. Requires a GitHub repository as the source."; exit 1 }

      $version = if ($env:BUILD_BUILDNUMBER) { $env:BUILD_BUILDNUMBER } else { $env:GITHUB_RUN_NUMBER }
      if (-not $version) { Write-Error "BUILD_BUILDNUMBER or GITHUB_RUN_NUMBER is required"; exit 1 }

      $commitId = if ($env:BUILD_SOURCEVERSION) { $env:BUILD_SOURCEVERSION } else { $env:GITHUB_SHA }
      $artifactsDir = if ($env:ARTIFACTS_DIR) { $env:ARTIFACTS_DIR } else { "outputs/assets" }
      $uploadArtifacts = if ($env:UPLOAD_ARTIFACTS -eq 'false') { $false } else { $true }

      Publish-GitHubRelease -Version $version -CommitId $commitId -ApiKey $env:GITHUB_TOKEN `
        -ArtifactsDir $artifactsDir -Owner ($repoFullName -split '/')[0] -Repository ($repoFullName -split '/')[1] `
        -GenerateReleaseNotes $true -UploadArtifacts $uploadArtifacts -PublishRelease "true"
      if (-not $?) { exit 1 }
    required:
      env:
        - GITHUB_TOKEN
