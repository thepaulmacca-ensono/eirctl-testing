      name: ensono/eir-asciidoctor:1.2.45
      shell: pwsh
      shell_args:
        - -Command
    envfile:
      exclude:
        - sourceversionmessage
        - posh_azure_subscription

  infra:
    container:
      name: ensono/eir-infrastructure:1.2.45
