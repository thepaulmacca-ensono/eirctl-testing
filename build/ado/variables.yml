variables:
  # Versioning
  - name: version_major
    value: 0
  - name: version_minor
    value: 0
  - name: version_revision
    value: $[counter(format('{0}.{1}', variables['version_major'], variables['version_minor']), 0)]

  # Eirctl https://github.com/Ensono/eirctl/releases
  - name: eirctl_version
    value: 0.9.11
  - name: TENV_AUTO_INSTALL
    value: true

  # ADO
  - name: pool_vm_image
    value: ubuntu-24.04
  - name: is_main
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  - name: is_pre_release
    value: $[ne(variables['Build.SourceBranch'], 'refs/heads/main')]

  # Terraform
  - name: TF_FILE_LOCATION
    value: "/eirctl/src"
  - name: TF_BACKEND_FALSE
    value: true
