variables:
  # Versioning
  - name: version_major
    value: 0
  - name: version_minor
    value: 1
  - name: version_revision
    value: $[counter(join(variables['version_major'], join('-', variables['version_minor'])), 0)]
  - name: version_semver
    value: "$(version_major).$(version_minor).$(version_revision)"

  # Dependency versions
  # Eirctl https://github.com/Ensono/eirctl/releases
  - name: eirctl_version
    value: 0.9.11

  - name: pool_vm_image
    value: ubuntu-24.04

  # Terraform
  - name: TF_FILE_LOCATION
    value: /eirctl/src
