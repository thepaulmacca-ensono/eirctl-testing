variables:
  # Versioning
  - name: version_major
    value: 0
  - name: version_minor
    value: 0
  - name: version_revision
    value: $[counter(join(variables['version_major'], join('-', variables['version_minor'])), 0)]
  - name: version_semver
    value: "$(version_major).$(version_minor).$(version_revision)"

  # Dependency versions
  # Eirctl https://github.com/Ensono/eirctl/releases
  - name: eirctl_version
    value: 0.9.11
  # Tenv
  - name: TENV_AUTO_INSTALL
    value: true

  - name: pool_vm_image
    value: ubuntu-24.04
