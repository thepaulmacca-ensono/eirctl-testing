parameters:
  - name: module_name
    type: string
    displayName: Module name (directory under src/)
  - name: display_name
    type: string
    displayName: Display name for the module
  - name: eirctl_version
    type: string

jobs:
  - job: validate_${{ replace(parameters.module_name, '-', '_') }}
    displayName: "Validate: ${{ parameters.display_name }}"
    steps:
      - checkout: self
        fetchDepth: 1

      - template: setup.yml
        parameters:
          eirctl_version: ${{ parameters.eirctl_version }}

      - task: Bash@3
        displayName: Terraform Format Check
        inputs:
          targetType: inline
          script: |
            eirctl lint:terraform:format
        env:
          TF_FILE_LOCATION: src/${{ parameters.module_name }}/deploy/terraform

      - task: Bash@3
        displayName: Run Terraform Tests
        inputs:
          targetType: inline
          script: |
            eirctl tests
        env:
          TF_FILE_LOCATION: src/${{ parameters.module_name }}/deploy/terraform
