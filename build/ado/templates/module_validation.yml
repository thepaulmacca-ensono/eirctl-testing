parameters:
  - name: module_name
    type: string
  - name: display_name
    type: string
  - name: eirctl_version
    type: string
  - name: run_condition
    type: string
    default: "true"

jobs:
  - job: validate_${{ replace(parameters.module_name, '-', '_') }}
    displayName: "Validate ${{ parameters.display_name }} Module"
    condition: ${{ parameters.run_condition }}
    variables:
      TF_FILE_LOCATION: "src/${{ parameters.module_name }}/deploy/terraform"
    steps:
      - checkout: self
        fetchDepth: 1

      - template: setup.yml
        parameters:
          eirctl_version: ${{ parameters.eirctl_version }}

      - task: Bash@3
        displayName: Run Terraform Linting Checks
        inputs:
          targetType: inline
          script: eirctl terraform:lint

      - task: Bash@3
        displayName: Run Checkov Scan
        inputs:
          targetType: inline
          script: eirctl scan

      - task: Bash@3
        displayName: Debug - Find Checkov Results
        condition: succeededOrFailed()
        inputs:
          targetType: inline
          script: |
            echo "=== Checkov results ==="
            if [ -f "$(Build.SourcesDirectory)/checkov-results.xml" ]; then
              echo "File exists, size: $(wc -c < "$(Build.SourcesDirectory)/checkov-results.xml") bytes"
              head -20 "$(Build.SourcesDirectory)/checkov-results.xml"
            else
              echo "checkov-results.xml does not exist"
              find $(Build.SourcesDirectory) -name '*checkov*' 2>/dev/null || echo 'No checkov files found'
            fi

      - task: PublishTestResults@2
        displayName: Publish Checkov Scan Results
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: '**/checkov-results.xml'
          searchFolder: $(Build.SourcesDirectory)
          testRunTitle: 'Checkov Scan - ${{ parameters.display_name }}'

      - task: Bash@3
        displayName: Run Terraform Unit Tests
        inputs:
          targetType: inline
          script: eirctl tests

      - task: Bash@3
        displayName: Debug - Find Terraform Test Results
        condition: succeededOrFailed()
        inputs:
          targetType: inline
          script: |
            echo "=== Terraform test results ==="
            if [ -f "$(Build.SourcesDirectory)/terraform-test-results.xml" ]; then
              echo "File exists, size: $(wc -c < "$(Build.SourcesDirectory)/terraform-test-results.xml") bytes"
              echo "=== Content ==="
              cat "$(Build.SourcesDirectory)/terraform-test-results.xml"
            else
              echo "terraform-test-results.xml does not exist"
              find $(Build.SourcesDirectory) -name '*.xml' -type f 2>/dev/null || echo 'No XML files found'
            fi

      - task: PublishTestResults@2
        displayName: Publish Terraform Test Results
        condition: succeededOrFailed()
        inputs:
          testResultsFormat: JUnit
          testResultsFiles: '**/terraform-test-results.xml'
          searchFolder: $(Build.SourcesDirectory)
          testRunTitle: 'Terraform Tests - ${{ parameters.display_name }}'
