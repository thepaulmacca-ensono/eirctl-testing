parameters:
  - name: module_name
    type: string
    displayName: Module name (directory under src/)
  - name: display_name
    type: string
    displayName: Display name for the module
  - name: eirctl_version
    type: string
  - name: run_condition
    type: string
    default: "true"

jobs:
  - job: validate_${{ replace(parameters.module_name, '-', '_') }}
    displayName: "Validate: ${{ parameters.display_name }}"
    condition: ${{ parameters.run_condition }}
    steps:
      - checkout: self
        fetchDepth: 1

      - template: setup.yml
        parameters:
          eirctl_version: ${{ parameters.eirctl_version }}

      # NOTE: export is required because eirctl runs inside Docker containers
      # where ADO env: blocks do not override values from eirctl.env
      - task: Bash@3
        displayName: Terraform Format Check
        inputs:
          targetType: inline
          script: |
            export TF_FILE_LOCATION="src/${{ parameters.module_name }}/deploy/terraform"
            eirctl lint:terraform:format

      - task: Bash@3
        displayName: Run Terraform Tests
        inputs:
          targetType: inline
          script: |
            export TF_FILE_LOCATION="src/${{ parameters.module_name }}/deploy/terraform"
            eirctl tests
