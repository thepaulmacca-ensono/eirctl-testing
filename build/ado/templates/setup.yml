parameters:
  - name: eirctl_version
    type: string

steps:
  - checkout: self

  - task: Bash@3
    displayName: "Install Eirctl v${{ parameters.eirctl_version }}"
    inputs:
      targetType: inline
      script: |
        set -euo pipefail

        rm -rf /tmp/eirctl /usr/local/bin/eirctl
        wget https://github.com/Ensono/eirctl/releases/download/${{ parameters.eirctl_version }}/eirctl-linux-amd64 -O /tmp/eirctl
        chmod u+x /tmp/eirctl
        mv /tmp/eirctl /usr/local/bin/eirctl
