name: $(version_major).$(version_minor).$(version_revision)

parameters:
  - name: pre_release
    displayName: Create a Pre-Release from a Feature Branch
    type: boolean
    default: false

  - name: generate_documentation
    displayName: Generate Documentation
    type: boolean
    default: false

  - name: modules
    displayName: Modules to Validate and Build
    type: object
    default:
      - name: management_landing_zone
        displayName: Management Landing Zone
      - name: connectivity_landing_zone_hub_spoke
        displayName: Connectivity Landing Zone (Hub & Spoke)
      - name: connectivity_landing_zone_virtual_wan
        displayName: Connectivity Landing Zone (Virtual WAN)
      - name: identity_landing_zone
        displayName: Identity Landing Zone

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pool:
  vmImage: $(pool_vm_image)

variables:
  - template: variables.yml

stages:
  - stage: Preliminaries
    jobs:
      - job: Build_Number
        displayName: Set Build Number and Validate
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Set Build Number
            inputs:
              targetType: inline
              script: |
                eirctl ado:build:number

          - task: Bash@3
            displayName: Perform YAML Linting
            inputs:
              targetType: inline
              script: |
                eirctl lint:yaml

  - stage: Validate
    displayName: Validate Modules
    dependsOn:
      - Preliminaries
    jobs:
      - ${{ each module in parameters.modules }}:
          - template: templates/module_validation.yml
            parameters:
              module_name: ${{ module.name }}
              display_name: ${{ module.displayName }}
              eirctl_version: $(eirctl_version)

  - ${{ if eq(parameters.generate_documentation, true) }}:
      - stage: Documentation
        dependsOn:
          - Validate
        jobs:
          - job: Generate_Documentation
            displayName: Generate Documentation
            steps:
              - checkout: self
                fetchDepth: 1

              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: Generate Documentation
                inputs:
                  targetType: inline
                  script: |
                    eirctl docs
                env:
                  BUILDNUMBER: $(Build.BuildNumber)

              - task: PublishBuildArtifacts@1
                displayName: Publish Documentation
                inputs:
                  pathToPublish: $(Build.SourcesDirectory)/outputs/docs
                  artifactName: docs

  - stage: Build
    displayName: Build Package
    dependsOn:
      - Validate
    jobs:
      - job: Create_Package
        displayName: Create Package
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Package All Modules
            inputs:
              targetType: inline
              script: |
                eirctl build
            env:
              REPOSITORY: $(Build.Repository.Name)
              BUILDNUMBER: $(Build.BuildNumber)
              TF_FILE_LOCATION: $(TF_FILE_LOCATION)

          - task: PublishBuildArtifacts@1
            displayName: Publish Package
            inputs:
              pathToPublish: $(Build.SourcesDirectory)/outputs
              artifactName: package
              publishLocation: Container

          # - task: PublishBuildArtifacts@1
          #   displayName: Publish README file
          #   inputs:
          #     pathToPublish: $(Build.SourcesDirectory)/outputs/module/README.md
          #     artifactName: readme

  - stage: Release
    displayName: Release to GitHub
    dependsOn:
      - Build
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq('${{ parameters.pre_release }}', 'true')))
    variables:
      - group: github-creds
    jobs:
      - job: Create_GitHub_Release
        displayName: Create GitHub Release
        steps:
          - checkout: self
            fetchDepth: 1

          - ${{ if eq(parameters.generate_documentation, true) }}:
              - task: DownloadPipelineArtifact@2
                displayName: Download Documentation Artifact
                inputs:
                  artifact: docs
                  patterns: "**/*.pdf"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - task: DownloadPipelineArtifact@2
            displayName: Download Package Artifact
            inputs:
              artifact: package
              patterns: "**/*.zip"
              path: $(Build.SourcesDirectory)/outputs/assets

          # - task: DownloadPipelineArtifact@2
          #   displayName: Download README Artifact
          #   inputs:
          #     artifact: readme
          #     patterns: "**/*.md"
          #     path: $(Build.SourcesDirectory)/outputs/assets

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Release
            inputs:
              targetType: inline
              script: |
                eirctl release
            env:
              STAGE: Release
              PUBLISH_RELEASE: "true"
              GITHUB_TOKEN: $(GITHUB_TOKEN)
              OWNER: thepaulmacca-ensono
              REPOSITORY: $(Build.Repository.Name)
              BUILD_BUILDNUMBER: $(Build.BuildNumber)
              COMMIT_ID: $(Build.SourceVersion)
              ARTIFACTS_DIR: /eirctl/outputs/assets
              ${{ if ne(variables['Build.SourceBranch'], 'refs/heads/main') }}:
                PRERELEASE: "true"
