# Set the name which will define the build number
name: $(version_semver)

parameters:
  - name: pre_release
    displayName: Create a Pre-Release from a Feature Branch
    type: boolean
    default: false

  - name: generate_documentation
    displayName: Generate Documentation
    type: boolean
    default: true

  - name: modules
    displayName: Modules to Publish
    type: object
    default:
      - name: management
        display_name: Management
      - name: connectivity-hub-spoke
        display_name: Connectivity (Hub & Spoke)
      - name: connectivity-virtual-wan
        display_name: Connectivity (Virtual WAN)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pr:
  branches:
    include:
      - main

pool:
  vmImage: $(pool_vm_image)

variables:
  - template: variables.yml

stages:
  - stage: Preliminaries
    jobs:
      - job: Build_Lint
        displayName: Set Build Number and Lint
        steps:
          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Set Build Number
            inputs:
              targetType: inline
              script: |
                eirctl ado:build:number

          - task: Bash@3
            displayName: Perform YAML Linting
            inputs:
              targetType: inline
              script: |
                eirctl lint:yaml

          - task: Bash@3
            displayName: Perform Terraform Format Check
            inputs:
              targetType: inline
              script: |
                eirctl lint:terraform:format

          - task: Bash@3
            displayName: Lint PowerShell in Task Definitions
            inputs:
              targetType: inline
              script: |
                eirctl lint:powershell

          - task: PublishTestResults@2
            displayName: Publish PSScriptAnalyzer Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results/psscriptanalyzer-results.xml'
              searchFolder: $(Build.SourcesDirectory)
              testRunTitle: 'PSScriptAnalyzer Results'
              failTaskOnFailedTests: true
              failTaskOnMissingResultsFile: true

      - job: Detect_Changes
        displayName: Detect Changed Modules
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            name: diff_base
            displayName: Determine Diff Base
            inputs:
              targetType: inline
              script: |
                set -euo pipefail

                if [[ "$(Build.Reason)" == "PullRequest" ]]; then
                  BASE_SHA="origin/$(System.PullRequest.TargetBranch)"
                else
                  # Query the last successful CI build to diff against, ensuring no commits are missed
                  # between pipeline runs (e.g. when multiple PRs merge before the pipeline processes them)
                  LAST_SUCCESS_SHA=$(curl -s -H "Authorization: Bearer $(System.AccessToken)" \
                    "$(System.CollectionUri)$(System.TeamProject)/_apis/build/builds?definitions=$(System.DefinitionId)&resultFilter=succeeded&statusFilter=completed&branchName=refs/heads/main&\$top=1&api-version=7.1" \
                    | jq -r '.value[0].sourceVersion // empty')

                  if [[ -n "$LAST_SUCCESS_SHA" ]] && git cat-file -e "$LAST_SUCCESS_SHA" 2>/dev/null; then
                    echo "Using last successful build commit: $LAST_SUCCESS_SHA"
                    BASE_SHA="$LAST_SUCCESS_SHA"
                  else
                    echo "Could not determine last successful build commit, falling back to HEAD~1"
                    BASE_SHA="HEAD~1"
                  fi
                fi

                echo "Diff base: $BASE_SHA"
                echo "##vso[task.setvariable variable=BASE_SHA;isOutput=true]$BASE_SHA"

                CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")

                if [[ -z "$CHANGED_FILES" ]]; then
                  echo "No changed files detected"
                else
                  echo "Changed files:"
                  echo "$CHANGED_FILES"
                fi

          - ${{ each module in parameters.modules }}:
              - task: Bash@3
                name: check_${{ replace(module.name, '-', '_') }}
                displayName: "Check Changes for ${{ module.display_name }}"
                inputs:
                  targetType: inline
                  script: |
                    set -euo pipefail

                    BASE_SHA="$(diff_base.BASE_SHA)"
                    CHANGED_FILES=$(git diff --name-only "$BASE_SHA" HEAD 2>/dev/null || echo "")

                    if [[ -z "$CHANGED_FILES" ]]; then
                      echo "No changed files detected, marking module as changed"
                      echo "##vso[task.setvariable variable=changed;isOutput=true]true"
                    elif echo "$CHANGED_FILES" | grep -q "^src/${{ module.name }}/"; then
                      echo "Module ${{ module.name }} has changes"
                      echo "##vso[task.setvariable variable=changed;isOutput=true]true"
                    else
                      echo "Module ${{ module.name }} has no changes"
                      echo "##vso[task.setvariable variable=changed;isOutput=true]false"
                    fi

  - stage: Validate
    displayName: Validate Modules
    condition: or(eq(variables['Build.Reason'], 'PullRequest'), eq(${{ parameters.pre_release }}, true))
    dependsOn:
      - Preliminaries
    variables:
      ${{ each module in parameters.modules }}:
        ${{ replace(module.name, '-', '_') }}_changed: $[ stageDependencies.Preliminaries.Detect_Changes.outputs['check_${{ replace(module.name, '-', '_') }}.changed'] ]
    jobs:
      - ${{ each module in parameters.modules }}:
          - template: templates/module_validation.yml
            parameters:
              module_name: ${{ module.name }}
              display_name: ${{ module.display_name }}
              eirctl_version: $(eirctl_version)
              module_changed: ${{ replace(module.name, '-', '_') }}_changed

  - ${{ if eq(parameters.generate_documentation, true) }}:
      - stage: Documentation
        dependsOn:
          - Validate
        condition: and(not(failed('Validate')), not(canceled()))
        jobs:
          - job: Generate_Documentation
            displayName: Generate Documentation
            steps:
              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: Generate Repository Documentation
                inputs:
                  targetType: inline
                  script: |
                    eirctl docs
                env:
                  BUILDNUMBER: $(Build.BuildNumber)

              # Upload the documentation as a pipeline artifact
              - task: PublishPipelineArtifact@1
                displayName: Publish Repository Documentation
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs/docs
                  artifact: docs

  - stage: Build
    displayName: Build Modules
    condition: and(not(failed('Validate')), not(canceled()))
    dependsOn:
      - Preliminaries
      - Validate
    jobs:
      - ${{ each module in parameters.modules }}:
          - job: Build_${{ replace(module.name, '-', '_') }}
            displayName: "Build ${{ module.display_name }}"
            steps:
              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: "Build ${{ module.display_name }} Module"
                inputs:
                  targetType: inline
                  script: |
                    eirctl build
                env:
                  TF_FILE_LOCATION: "src/${{ module.name }}/deploy/terraform"
                  TF_MODULE_NAME: ${{ module.name }}
                  ADOC_INDEX_FILE: "docs/readme/${{ module.name }}/index.adoc"

              # Upload the zip file as a pipeline artifact
              - task: PublishPipelineArtifact@1
                displayName: "Publish ${{ module.display_name }} Package"
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs
                  artifact: ${{ module.name }}

  - stage: Release
    dependsOn:
      - Preliminaries
      - Build
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    condition: and(not(failed()), not(canceled()), or(eq(variables['is_main'], 'true'), eq(${{ parameters.pre_release }}, true)))
    variables:
      - group: github-creds
    jobs:
      - job: Create_GitHub_Release
        displayName: Create GitHub Release
        steps:
          - ${{ if eq(parameters.generate_documentation, true) }}:
              - task: DownloadPipelineArtifact@2
                displayName: Download Repository Documentation Artifact
                inputs:
                  artifact: docs
                  patterns: "**/*.pdf"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - ${{ each module in parameters.modules }}:
              - task: DownloadPipelineArtifact@2
                displayName: "Download ${{ module.display_name }} Module Artifact"
                inputs:
                  artifact: ${{ module.name }}
                  patterns: "**/*.zip"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - ${{ if eq(parameters.pre_release, true) }}:
              - task: Bash@3
                displayName: Publish Pre-Release
                inputs:
                  targetType: inline
                  script: |
                    eirctl release
                env:
                  GITHUB_TOKEN: $(GITHUB_TOKEN)
                  ARTIFACTS_DIR: /eirctl/outputs/assets
                  PRERELEASE: "true"

          - ${{ else }}:
              - task: Bash@3
                displayName: Publish Release
                inputs:
                  targetType: inline
                  script: |
                    eirctl release
                env:
                  GITHUB_TOKEN: $(GITHUB_TOKEN)
                  ARTIFACTS_DIR: /eirctl/outputs/assets
