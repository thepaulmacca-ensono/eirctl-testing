# Set the name which will define the build number
name: $(version_semver)

parameters:
  - name: pre_release
    displayName: Create a Pre-Release from a Feature Branch
    type: boolean
    default: false

  - name: generate_documentation
    displayName: Generate Documentation
    type: boolean
    default: true

  - name: modules
    displayName: Modules to Publish
    type: object
    default:
      - name: management-landing-zone
        display_name: Management Landing Zone
      - name: connectivity-landing-zone-hub-spoke
        display_name: Connectivity Landing Zone (Hub & Spoke)
      - name: connectivity-landing-zone-virtual-wan
        display_name: Connectivity Landing Zone (Virtual WAN)
      - name: identity-landing-zone
        display_name: Identity Landing Zone

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pool:
  vmImage: $(pool_vm_image)

variables:
  - template: variables.yml

stages:
  - stage: Preliminaries
    jobs:
      - job: Build_Lint
        displayName: Set Build Number and Lint
        steps:
          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Set Build Number
            inputs:
              targetType: inline
              script: |
                eirctl ado:build:number

          - task: Bash@3
            displayName: Perform YAML Linting
            inputs:
              targetType: inline
              script: |
                eirctl lint:yaml

          - task: Bash@3
            displayName: Perform Terraform Format Check
            inputs:
              targetType: inline
              script: |
                eirctl lint:terraform:format

          - task: Bash@3
            displayName: Lint PowerShell in Task Definitions
            inputs:
              targetType: inline
              script: |
                eirctl lint:powershell

          - task: PublishTestResults@2
            displayName: Publish PSScriptAnalyzer Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results/psscriptanalyzer-results.xml'
              searchFolder: $(Build.SourcesDirectory)
              testRunTitle: 'PSScriptAnalyzer Results'
              failTaskOnFailedTests: true
              failTaskOnMissingResultsFile: true

  - stage: Validate
    displayName: Validate Modules
    dependsOn:
      - Preliminaries
    jobs:
      - ${{ each module in parameters.modules }}:
          - template: templates/module_validation.yml
            parameters:
              module_name: ${{ module.name }}
              display_name: ${{ module.display_name }}
              eirctl_version: $(eirctl_version)

  - ${{ if eq(parameters.generate_documentation, true) }}:
      - stage: Documentation
        dependsOn:
          - Validate
        jobs:
          - job: Generate_Documentation
            displayName: Generate Documentation
            steps:
              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: Generate Repository Documentation
                inputs:
                  targetType: inline
                  script: |
                    eirctl docs
                env:
                  BUILDNUMBER: $(Build.BuildNumber)

              # Upload the documentation as a pipeline artifact
              - task: PublishPipelineArtifact@1
                displayName: Publish Repository Documentation
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs/docs
                  artifact: docs

  - stage: Build
    displayName: Build Modules
    dependsOn:
      - Validate
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    jobs:
      - ${{ each module in parameters.modules }}:
          - job: Build_${{ replace(module.name, '-', '_') }}
            displayName: "Build ${{ module.display_name }}"
            steps:
              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: "Build ${{ module.display_name }} Module"
                inputs:
                  targetType: inline
                  script: |
                    eirctl build
                env:
                  TF_FILE_LOCATION: "src/${{ module.name }}"
                  TF_MODULE_NAME: ${{ module.name }}
                  ADOC_INDEX_FILE: "docs/readme/${{ module.name }}/index.adoc"

              # Upload the zip file as a pipeline artifact
              - task: PublishPipelineArtifact@1
                displayName: "Publish ${{ module.display_name }} Package"
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs
                  artifact: ${{ module.name }}

              # - task: PublishPipelineArtifact@1
              #   displayName: Publish README file
              #   inputs:
              #     targetPath: $(Build.SourcesDirectory)/outputs/module/README.md
              #     artifact: readme

  - stage: Release
    dependsOn:
      - Build
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    condition: and(succeeded(), or(eq(variables['is_main'], 'true'), eq(${{ parameters.pre_release }}, true)))
    variables:
      - group: github-creds
    jobs:
      - job: Create_GitHub_Release
        displayName: Create GitHub Release
        steps:
          - ${{ if eq(parameters.generate_documentation, true) }}:
              - task: DownloadPipelineArtifact@2
                displayName: Download Repository Documentation Artifact
                inputs:
                  artifact: docs
                  patterns: "**/*.pdf"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - ${{ each module in parameters.modules }}:
              - task: DownloadPipelineArtifact@2
                displayName: "Download ${{ module.display_name }} Module Artifact"
                inputs:
                  artifact: ${{ module.name }}
                  patterns: "**/*.zip"
                  path: $(Build.SourcesDirectory)/outputs/assets

          # - task: DownloadPipelineArtifact@2
          #   inputs:
          #     artifact: readme
          #     path: $(Build.SourcesDirectory)/outputs/assets

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - ${{ if eq(parameters.pre_release, true) }}:
              - task: Bash@3
                displayName: Publish Pre-Release
                inputs:
                  targetType: inline
                  script: |
                    eirctl release
                env:
                  GITHUB_TOKEN: $(GITHUB_TOKEN)
                  ARTIFACTS_DIR: /eirctl/outputs/assets
                  PRERELEASE: "true"

          - ${{ else }}:
              - task: Bash@3
                displayName: Publish Release
                inputs:
                  targetType: inline
                  script: |
                    eirctl release
                env:
                  GITHUB_TOKEN: $(GITHUB_TOKEN)
                  ARTIFACTS_DIR: /eirctl/outputs/assets
