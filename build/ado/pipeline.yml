name: $(version_major).$(version_minor).$(version_revision)

parameters:
  - name: pre_release
    displayName: Create a Pre-Release from a Feature Branch
    type: boolean
    default: false

  - name: generate_documentation
    displayName: Generate Documentation
    type: boolean
    default: false

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pool:
  vmImage: $(pool_vm_image)

variables:
  - template: variables.yml

stages:
  - stage: Preliminaries
    jobs:
      - job: Build_Number
        displayName: Set Build Number and Lint
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Set Build Number
            inputs:
              targetType: inline
              script: |
                eirctl ado:build:number

          - task: Bash@3
            displayName: Perform YAML Linting
            inputs:
              targetType: inline
              script: |
                eirctl lint:yaml

      - job: Detect_Changes
        displayName: Detect Module Changes
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            name: modules
            displayName: Check Changed Modules
            inputs:
              targetType: inline
              script: |
                if [ -n "$SYSTEM_PULLREQUEST_TARGETBRANCH" ]; then
                  BASE="origin/${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
                else
                  BASE="HEAD~1"
                fi

                CHANGED=$(git diff --name-only $BASE HEAD 2>/dev/null)
                if [ $? -ne 0 ] || [ -z "$CHANGED" ] && [ "$BASE" = "HEAD~1" ]; then
                  echo "Unable to determine changes, defaulting to run all modules"
                  CHANGED="src/"
                fi

                echo "Changed files:"
                echo "$CHANGED"
                echo ""

                for MODULE in management_landing_zone connectivity_landing_zone_hub_spoke connectivity_landing_zone_virtual_wan identity_landing_zone; do
                  if echo "$CHANGED" | grep -q "^src/$MODULE/"; then
                    echo "$MODULE: changed"
                    echo "##vso[task.setvariable variable=${MODULE};isOutput=true]true"
                  else
                    echo "$MODULE: skipped"
                    echo "##vso[task.setvariable variable=${MODULE};isOutput=true]false"
                  fi
                done

  - stage: Validate
    displayName: Validate Modules
    dependsOn:
      - Preliminaries
    variables:
      management_landing_zone_changed: $[stageDependencies.Preliminaries.Detect_Changes.outputs['modules.management_landing_zone']]
      connectivity_landing_zone_hub_spoke_changed: $[stageDependencies.Preliminaries.Detect_Changes.outputs['modules.connectivity_landing_zone_hub_spoke']]
      connectivity_landing_zone_virtual_wan_changed: $[stageDependencies.Preliminaries.Detect_Changes.outputs['modules.connectivity_landing_zone_virtual_wan']]
      identity_landing_zone_changed: $[stageDependencies.Preliminaries.Detect_Changes.outputs['modules.identity_landing_zone']]
    jobs:
      - template: templates/module_validation.yml
        parameters:
          module_name: management_landing_zone
          display_name: Management Landing Zone
          eirctl_version: $(eirctl_version)
          run_condition: eq(variables.management_landing_zone_changed, 'true')

      - template: templates/module_validation.yml
        parameters:
          module_name: connectivity_landing_zone_hub_spoke
          display_name: Connectivity Landing Zone (Hub & Spoke)
          eirctl_version: $(eirctl_version)
          run_condition: eq(variables.connectivity_landing_zone_hub_spoke_changed, 'true')

      - template: templates/module_validation.yml
        parameters:
          module_name: connectivity_landing_zone_virtual_wan
          display_name: Connectivity Landing Zone (Virtual WAN)
          eirctl_version: $(eirctl_version)
          run_condition: eq(variables.connectivity_landing_zone_virtual_wan_changed, 'true')

      - template: templates/module_validation.yml
        parameters:
          module_name: identity_landing_zone
          display_name: Identity Landing Zone
          eirctl_version: $(eirctl_version)
          run_condition: eq(variables.identity_landing_zone_changed, 'true')

  - ${{ if eq(parameters.generate_documentation, true) }}:
      - stage: Documentation
        dependsOn:
          - Validate
        jobs:
          - job: Generate_Documentation
            displayName: Generate Documentation
            steps:
              - checkout: self
                fetchDepth: 1

              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: Generate Documentation
                inputs:
                  targetType: inline
                  script: |
                    eirctl docs
                env:
                  BUILDNUMBER: $(Build.BuildNumber)

              - task: PublishPipelineArtifact@1
                displayName: Publish Documentation
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs/docs
                  artifact: docs

  - stage: Build
    displayName: Build Package
    dependsOn:
      - Validate
    jobs:
      - job: Create_Package
        displayName: Create Package
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Package All Modules
            inputs:
              targetType: inline
              script: |
                eirctl build
            env:
              REPOSITORY: $(Build.Repository.Name)
              BUILDNUMBER: $(Build.BuildNumber)
              TF_FILE_LOCATION: $(TF_FILE_LOCATION)

          - task: PublishPipelineArtifact@1
            displayName: Publish Package
            inputs:
              targetPath: $(Build.SourcesDirectory)/outputs
              artifact: package

  - stage: Release
    displayName: Release to GitHub
    dependsOn:
      - Build
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    condition: and(succeeded(), or(eq(variables['is_main'], 'true'), eq('${{ parameters.pre_release }}', 'true')))
    variables:
      - group: github-creds
    jobs:
      - job: Create_GitHub_Release
        displayName: Create GitHub Release
        steps:
          - checkout: self
            fetchDepth: 1

          - ${{ if eq(parameters.generate_documentation, true) }}:
              - task: DownloadPipelineArtifact@2
                displayName: Download Documentation Artifact
                inputs:
                  artifact: docs
                  patterns: "**/*.pdf"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - task: DownloadPipelineArtifact@2
            displayName: Download Package Artifact
            inputs:
              artifact: package
              patterns: "**/*.zip"
              path: $(Build.SourcesDirectory)/outputs/assets

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Release
            inputs:
              targetType: inline
              script: |
                eirctl release
            env:
              STAGE: Release
              PUBLISH_RELEASE: "true"
              GITHUB_TOKEN: $(GITHUB_TOKEN)
              OWNER: thepaulmacca-ensono
              REPOSITORY: $(Build.Repository.Name)
              BUILD_BUILDNUMBER: $(Build.BuildNumber)
              COMMIT_ID: $(Build.SourceVersion)
              ARTIFACTS_DIR: /eirctl/outputs/assets
              ${{ if ne(variables['Build.SourceBranch'], 'refs/heads/main') }}:
                PRERELEASE: "true"
