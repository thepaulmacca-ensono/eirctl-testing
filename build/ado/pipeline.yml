name: $(version_major).$(version_minor).$(version_revision)

parameters:
  - name: pre_release
    displayName: Create a pre-release from a feature branch
    type: boolean
    default: false

  - name: generate_documentation
    displayName: Generate Documentation
    type: boolean
    default: false

  - name: modules
    displayName: Modules to Validate/Publish
    type: object
    default:
      - name: management_landing_zone
        display_name: Management Landing Zone
      - name: connectivity_landing_zone_hub_spoke
        display_name: Connectivity Landing Zone (Hub & Spoke)
      - name: connectivity_landing_zone_virtual_wan
        display_name: Connectivity Landing Zone (Virtual WAN)
      - name: identity_landing_zone
        display_name: Identity Landing Zone

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - src/*

pool:
  vmImage: $(pool_vm_image)

variables:
  - template: variables.yml

stages:
  - stage: Preliminaries
    jobs:
      - job: Build_Lint
        displayName: Set Build Number and Lint YAML
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Set Build Number
            inputs:
              targetType: inline
              script: |
                eirctl ado:build:number

          - task: Bash@3
            displayName: Perform YAML Linting
            inputs:
              targetType: inline
              script: |
                eirctl lint:yaml

          - task: Bash@3
            displayName: Lint PowerShell in Task Definitions
            inputs:
              targetType: inline
              script: |
                eirctl lint:powershell

          - task: PublishTestResults@2
            displayName: Publish PSScriptAnalyzer Results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '**/test-results/psscriptanalyzer-results.xml'
              searchFolder: $(Build.SourcesDirectory)
              testRunTitle: 'PSScriptAnalyzer Results'
              failTaskOnFailedTests: true
              failTaskOnMissingResultsFile: true

      - job: Detect_Changes
        displayName: Detect Module Changes
        steps:
          - checkout: self
            fetchDepth: 0

          - task: Bash@3
            name: modules
            displayName: Check Changed Modules
            inputs:
              targetType: inline
              script: |
                if [ -n "$SYSTEM_PULLREQUEST_TARGETBRANCH" ]; then
                  BASE="origin/${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
                else
                  BASE="HEAD~1"
                fi

                CHANGED=$(git diff --name-only $BASE HEAD 2>&1)
                if { [ $? -ne 0 ] || [ -z "$CHANGED" ]; } && [ "$BASE" = "HEAD~1" ]; then
                  echo "Warning: Unable to determine changes (git diff output: $CHANGED), defaulting to run all modules"
                  CHANGED="src/"
                fi

                echo "Changed files:"
                echo "$CHANGED"
                echo ""

                MODULES=$(cat <<'EOF' | jq -r '.[].name'
                ${{ convertToJson(parameters.modules) }}
                EOF
                )

                for MODULE in $MODULES; do
                  if echo "$CHANGED" | grep -q "^src/$MODULE/"; then
                    echo "$MODULE: changed"
                    echo "##vso[task.setvariable variable=${MODULE};isOutput=true]true"
                  else
                    echo "$MODULE: skipped"
                    echo "##vso[task.setvariable variable=${MODULE};isOutput=true]false"
                  fi
                done

  - stage: Validate
    dependsOn:
      - Preliminaries
    variables:
      ${{ each module in parameters.modules }}:
        ${{ module.name }}_changed: $[stageDependencies.Preliminaries.Detect_Changes.outputs['modules.${{ module.name }}']]
    jobs:
      - ${{ each module in parameters.modules }}:
          - template: templates/module_validation.yml
            parameters:
              module_name: ${{ module.name }}
              display_name: ${{ module.display_name }}
              eirctl_version: $(eirctl_version)
              run_condition: eq(variables.${{ module.name }}_changed, 'true')

  - ${{ if eq(parameters.generate_documentation, true) }}:
      - stage: Documentation
        dependsOn:
          - Validate
        jobs:
          - job: Generate_Documentation
            displayName: Generate Documentation
            steps:
              - checkout: self
                fetchDepth: 1

              - template: templates/setup.yml
                parameters:
                  eirctl_version: $(eirctl_version)

              - task: Bash@3
                displayName: Generate Documentation
                inputs:
                  targetType: inline
                  script: |
                    eirctl docs
                env:
                  BUILDNUMBER: $(Build.BuildNumber)

              - task: PublishPipelineArtifact@1
                displayName: Publish Documentation Artifact
                inputs:
                  targetPath: $(Build.SourcesDirectory)/outputs/docs
                  artifact: docs

  - stage: Build
    dependsOn:
      - Validate
    jobs:
      - job: Build_Package
        displayName: Build and Create Package
        steps:
          - checkout: self
            fetchDepth: 1

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - task: Bash@3
            displayName: Build and Package Modules
            inputs:
              targetType: inline
              script: |
                eirctl build
            env:
              TF_FILE_LOCATION: $(TF_FILE_LOCATION)

          - task: PublishPipelineArtifact@1
            displayName: Publish Package Artifact
            inputs:
              targetPath: $(Build.SourcesDirectory)/outputs
              artifact: package

  - stage: Release
    dependsOn:
      - Build
      - ${{ if eq(parameters.generate_documentation, true) }}:
          - Documentation
    condition: and(succeeded(), or(eq(variables['is_main'], 'true'), eq('${{ parameters.pre_release }}', 'true')))
    variables:
      - group: github-creds
    jobs:
      - job: Create_GitHub_Release
        displayName: Create GitHub Release
        steps:
          - checkout: self
            fetchDepth: 1

          - ${{ if eq(parameters.generate_documentation, true) }}:
              - task: DownloadPipelineArtifact@2
                displayName: Download Documentation Artifact
                inputs:
                  artifact: docs
                  patterns: "**/*.pdf"
                  path: $(Build.SourcesDirectory)/outputs/assets

          - task: DownloadPipelineArtifact@2
            displayName: Download Package Artifact
            inputs:
              artifact: package
              patterns: "**/*.zip"
              path: $(Build.SourcesDirectory)/outputs/assets

          - template: templates/setup.yml
            parameters:
              eirctl_version: $(eirctl_version)

          - ${{ if eq(parameters.pre_release, true) }}:
            - task: Bash@3
              displayName: Publish Pre-Release
              inputs:
                targetType: inline
                script: |
                  eirctl release
              env:
                PUBLISH_RELEASE: "true"
                GITHUB_TOKEN: $(GITHUB_TOKEN)
                ARTIFACTS_DIR: /eirctl/outputs/assets
                PRERELEASE: "true"

          - ${{ else }}:
            - task: Bash@3
              displayName: Publish Release
              inputs:
                targetType: inline
                script: |
                  eirctl release
              env:
                PUBLISH_RELEASE: "true"
                GITHUB_TOKEN: $(GITHUB_TOKEN)
                ARTIFACTS_DIR: /eirctl/outputs/assets
