# yaml-language-server: $schema=https://raw.githubusercontent.com/Ensono/eirctl/refs/heads/main/schemas/schema_v1.json

import:
  - https://raw.githubusercontent.com/Ensono/stacks-eirctl-configurations/refs/tags/v0.1.14/shared/contexts/eirctl.yaml
  - https://raw.githubusercontent.com/Ensono/stacks-eirctl-configurations/refs/tags/v0.1.14/shared/security/eirctl.yaml
  - https://raw.githubusercontent.com/Ensono/stacks-eirctl-configurations/refs/tags/v0.1.14/shared/infra/terraform.yaml

watchers:
  lint:
    watch: ["*.yml"]
    events: [create, write]
    task: lint:yaml
  terraform:
    watch: ["*.tf", "*.tfvars"]
    events: [create, write]
    task: lint:terraform:format

# Local Tasks
tasks:
  terraform:docs:readme:
    context: infra
    description: |
      Update the API Reference section in README.md using terraform-docs

      Runs terraform-docs to inject markdown documentation between
      <!-- BEGIN_TF_DOCS --> and <!-- END_TF_DOCS --> markers in the README
    command: |
      $readmePath = Join-Path $PWD "README.md"

      if (-not (Test-Path $readmePath)) {
        Write-Error "README.md not found"
        exit 1
      }

      terraform-docs markdown table --output-file $readmePath --output-mode inject deploy/terraform
      exit $LASTEXITCODE

pipelines:
  lint:
    - task: lint:yaml
    - task: lint:terraform:format
      depends_on: lint:yaml
    - task: lint:terraform:validate
      depends_on: lint:terraform:format
    - task: lint:terraform:tflint
      depends_on: lint:terraform:validate

  scan:
    - task: scan:terraform:checkov

  docs:
    - task: terraform:docs:readme

  infrastructure:plan:
    - task: terraform:init
    - task: terraform:plan
      depends_on: terraform:init

  infrastructure:apply:
    - task: terraform:init
    - task: terraform:apply
      depends_on: terraform:init

  infrastructure:destroy:plan:
    - task: terraform:init
    - task: terraform:destroy:plan
      depends_on: terraform:init

  infrastructure:destroy:apply:
    - task: terraform:init
    - task: terraform:destroy:apply
      depends_on: terraform:init
